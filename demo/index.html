<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="description" content="avbridge.js — VLC-style media playback for the browser. Play any video file." />
    <title>avbridge.js</title>
    <style>
      :root { color-scheme: dark; --accent: #5b9; --bg: #111; --surface: #1a1a1a; --text: #eee; --text-dim: #aaa; }
      * { box-sizing: border-box; margin: 0; }
      body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); -webkit-text-size-adjust: 100%; }

      /* ── Layout ──────────────────────────────────────────────── */
      .site { max-width: 960px; margin: 0 auto; padding: 16px; }

      /* ── Header ──────────────────────────────────────────────── */
      .header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; }
      .header h1 { font-size: clamp(18px, 4vw, 24px); font-weight: 700; }
      .header nav { display: flex; gap: 12px; font-size: 14px; }
      .header nav a { color: var(--accent); text-decoration: none; }
      .header nav a:hover { text-decoration: underline; }
      .header nav a.active { font-weight: 600; }
      .tagline { color: var(--text-dim); font-size: 14px; margin-bottom: 16px; }

      /* ── Player ──────────────────────────────────────────────── */
      .player-wrap { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; overflow: hidden; touch-action: none; }
      .player-wrap avbridge-player { width: 100%; height: 100%; }

      /* ── File picker ─────────────────────────────────────────── */
      .picker { display: flex; gap: 12px; align-items: center; margin: 16px 0; flex-wrap: wrap; }
      .picker label { font-size: 14px; color: var(--text-dim); }
      .picker input[type="file"] { color: var(--text); font-size: 14px; max-width: 100%; }

      /* ── Diagnostics ─────────────────────────────────────────── */
      details { margin-top: 16px; background: var(--surface); padding: 12px; border-radius: 8px; }
      details summary { cursor: pointer; font-size: 14px; color: var(--text-dim); }
      pre { white-space: pre-wrap; word-break: break-word; font-size: 12px; margin-top: 8px; }

      .err { color: #ff8585; margin-top: 8px; font-size: 14px; }

      /* ── Footer ──────────────────────────────────────────────── */
      .footer { margin-top: 24px; padding-top: 16px; border-top: 1px solid #222; font-size: 12px; color: var(--text-dim); }
      .footer a { color: var(--accent); text-decoration: none; }

      /* ── Mobile ──────────────────────────────────────────────── */
      @media (max-width: 600px) {
        .site { padding: 8px; }
        .picker { gap: 8px; }
      }
    </style>
  </head>
  <body>
    <div class="site">
      <div class="header">
        <h1>avbridge.js</h1>
        <nav>
          <a href="./" class="active">Player</a>
          <a href="./convert.html">Converter</a>
        </nav>
      </div>
      <p class="tagline">VLC-style media playback for the browser. Pick any video file — avbridge.js probes, classifies, and plays it.</p>

      <div class="player-wrap">
        <avbridge-player id="player"></avbridge-player>
      </div>

      <div class="picker">
        <label>Media file: <input id="file" type="file" accept="video/*,audio/*,.mkv,.avi,.wmv,.flv,.mov,.rm,.rmvb" /></label>
        <label>Subtitle: <input id="subs" type="file" accept=".srt,.vtt" /></label>
      </div>

      <avbridge-subtitles for="player" style="max-height:200px;border-radius:8px;margin-top:8px;"></avbridge-subtitles>

      <p id="error" class="err"></p>

      <details>
        <summary>Diagnostics</summary>
        <pre id="diagnostics">{}</pre>
      </details>

      <div class="footer">
        <a href="https://github.com/keishi/avbridge">GitHub</a> ·
        <a href="https://www.npmjs.com/package/avbridge">npm</a> ·
        MIT License
      </div>
    </div>

    <script src="coi-serviceworker.js"></script>
    <script>
      window.AVBRIDGE_LIBAV_BASE = new URL("libav", document.baseURI).pathname;
    </script>
    <script type="module" src="./player-demo.ts"></script>
  </body>
</html>
