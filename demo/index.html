<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>avbridge demo</title>
    <style>
      :root { color-scheme: dark; }
      body { font-family: system-ui, sans-serif; background: #111; color: #eee; margin: 0; padding: 24px; max-width: 960px; margin: 0 auto; }
      h1 { margin-top: 0; }

      .player { position: relative; background: #000; aspect-ratio: 16/9; }
      .player video,
      .player avbridge-video { width: 100%; height: 100%; display: block; }
      avbridge-video::part(video) { background: #000; }

      .controls { display: flex; gap: 12px; align-items: center; padding: 10px 12px; background: #1a1a1a; border-radius: 0 0 6px 6px; }
      .controls button { background: #333; color: #eee; border: none; padding: 6px 12px; border-radius: 4px; font-size: 14px; cursor: pointer; min-width: 44px; }
      .controls button:hover:not(:disabled) { background: #444; }
      .controls button:disabled { opacity: 0.4; cursor: not-allowed; }
      .strat-btn { background: #333; color: #eee; border: none; padding: 4px 10px; border-radius: 4px; font-size: 12px; cursor: pointer; }
      .strat-btn:hover { background: #444; }
      .strat-btn.active { outline: 2px solid #5b9; }
      .controls input[type="range"] { flex: 1; accent-color: #5b9; }
      .controls .time { font-variant-numeric: tabular-nums; font-size: 12px; color: #aaa; min-width: 90px; text-align: right; }

      .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: 600; background: #333; }
      .badge.native { background: #2d6a4f; }
      .badge.remux  { background: #1e6091; }
      .badge.fallback { background: #9d4edd; }
      .badge.hybrid { background: #c77dff; }
      .badge.buffering { background: #b58000; }

      .row { display: flex; gap: 16px; align-items: center; margin: 16px 0; flex-wrap: wrap; }
      input[type="file"] { color: #eee; }
      details { margin-top: 16px; background: #1a1a1a; padding: 12px; border-radius: 8px; }
      pre { white-space: pre-wrap; word-break: break-word; font-size: 12px; }
      label { font-size: 14px; }
      .err { color: #ff8585; }
    </style>
  </head>
  <body>
    <h1>avbridge demo</h1>
    <p>
      <a href="./" style="color:#5b9;">Player</a> ·
      <a href="./convert.html" style="color:#5b9;">Converter</a>
    </p>
    <p>Pick a local media file. avbridge will probe it, classify it, and choose the best playback strategy.</p>

    <div class="row">
      <label>Media file: <input id="file" type="file" accept="video/*,audio/*,.mkv,.avi,.wmv,.flv,.mov" /></label>
      <label>Subtitle (optional): <input id="subs" type="file" accept=".srt,.vtt" /></label>
      <span id="badge" class="badge">no file</span>
    </div>

    <div class="player">
      <avbridge-video id="player"></avbridge-video>
    </div>
    <div class="controls">
      <button id="playPause" disabled>▶</button>
      <input id="seek" type="range" min="0" max="0" step="0.01" value="0" disabled />
      <span id="time" class="time">0:00 / 0:00</span>
    </div>

    <div class="row" id="strategy-switcher" style="display:none;">
      <span style="font-size:13px;color:#aaa;">Switch backend:</span>
      <button class="strat-btn" data-strategy="native">native</button>
      <button class="strat-btn" data-strategy="remux">remux</button>
      <button class="strat-btn" data-strategy="hybrid">hybrid</button>
      <button class="strat-btn" data-strategy="fallback">fallback</button>
    </div>

    <p id="error" class="err"></p>

    <details open>
      <summary>Diagnostics</summary>
      <pre id="diagnostics">{}</pre>
    </details>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
