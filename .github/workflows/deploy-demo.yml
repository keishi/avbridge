name: Deploy Demo to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Copy libav vendor binaries so the demo build can reference them.
      # The Vite build copies them into the output as public assets.
      - run: npm run predemo:build

      - run: npm run demo:build

      # Copy libav binaries into the built output so they're available
      # at /avbridge/libav/* on GitHub Pages.
      - name: Copy libav binaries to build output
        run: cp -r vendor/libav demo/dist/libav

      - uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
